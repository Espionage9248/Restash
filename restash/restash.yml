name: Restash
description: Computes a freshness score for scenes and performers into custom fields.
version: 0.1.0
url: https://github.com/Espionage9248/restash
exec:
  - python
  - "{pluginDir}/restash.py"
interface: raw
settings:
  tasteHalfLifeDays:    { displayName: Taste half-life (days), type: NUMBER }
  cooldownDays:         { displayName: Cooldown period (days), type: NUMBER }
  freshWeight:          { displayName: Freshness strength, type: NUMBER }
  wildcardPercent:      { displayName: Wildcard %, type: NUMBER }
  respectManualRatings: { displayName: Blend manual ratings as a taste prior, type: BOOLEAN }
  mirrorToRating100:    { displayName: Also mirror score to rating100 (destructive), type: BOOLEAN }
  excludeTagName:       { displayName: Exclusion tag name, type: STRING }
  dryRun:               { displayName: Dry run (log only), type: BOOLEAN }
tasks:
  - name: Dry Run Report
    description: Full compute, writes nothing, logs top-30 scenes/performers with score breakdowns
    defaultArgs: { mode: dry }
  - name: Recompute All
    description: (Not implemented in this build) Full taste-model rebuild and score write
    defaultArgs: { mode: full }
  - name: Quick Refresh
    description: (Not implemented in this build) Re-apply freshness/jitter using cached taste model
    defaultArgs: { mode: refresh }
  - name: Clear Restash Data
    description: (Not implemented in this build) Remove all Restash custom fields
    defaultArgs: { mode: clear }
